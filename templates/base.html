<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <meta name="theme-color" content="#0f172a">

    <title>Career Quest</title>

    <link
        rel="icon"
        href="{{ url_for('static', filename='logo.png') }}"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='mobile-polish.css') }}"
    >
</head>

<body>

<a class="skip-link" href="#main-content">
    Skip to content
</a>

<nav class="navbar" id="site-navbar" aria-label="Main navigation">

    <a class="nav-brand nav-brand-link" href="/" aria-label="Career Quest home">
        <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="nav-logo"
            alt=""
        >
        <span>Career Quest</span>
    </a>

    <div class="nav-controls">
        <button
            id="mobile-menu-toggle"
            class="mobile-menu-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="primary-nav-links"
        >
            <span aria-hidden="true">☰</span>
            <span>Menu</span>
        </button>

        <button
            id="theme-toggle"
            class="theme-toggle"
            type="button"
            aria-label="Switch color theme"
            title="Switch color theme"
        >
            🌙
        </button>
    </div>

    <div class="nav-links" id="primary-nav-links">

        <a href="/">
            <span aria-hidden="true">🏠</span>
            Home
        </a>

        {% if session.get("player_name") %}

        <a href="/dashboard">
            <span aria-hidden="true">📊</span>
            Dashboard
        </a>

        <a href="{{ url_for('leaderboards') }}">
            Leaderboards
        </a>

        <a href="{{ url_for('compare') }}">
            Compare
        </a>

        <a href="{{ url_for('achievements_page') }}">
            Achievements
        </a>

        <a href="{{ url_for('saved_careers_page') }}">
            Saved
        </a>

        <a href="{{ url_for('daily_challenge') }}">
            Daily
        </a>

        <a href="/feedback">
            Feedback
        </a>

        <span class="nav-player">
            <span aria-hidden="true">👤</span>
            {{ session["player_name"] }}
        </span>

        {% endif %}

    </div>

</nav>

<div
    class="navigation-safety-bar"
    id="navigation-safety-bar"
    hidden
>
    <button
        type="button"
        class="app-back-button"
        id="app-back-button"
    >
        <span aria-hidden="true">←</span>
        Back
    </button>

    <a href="/" class="app-home-button">
        <span aria-hidden="true">⌂</span>
        Home
    </a>
</div>

<main id="main-content" class="site-main">
    {% block content %}
    {% endblock %}
</main>

<footer class="footer">

    <div class="footer-brand-line">

        <span>
            🚀 Career Quest v1.0
        </span>

        <span>
            Created by
            <a href="https://github.com/Armaan788" target="_blank" rel="noopener noreferrer">
                Armaan Sharma
            </a>
        </span>

        <span>
            © 2026
        </span>

    </div>

    <div class="footer-links">

        <a href="/privacy">
            Privacy
        </a>

        <a href="/support">
            Support
        </a>

        <a href="/about">
            About
        </a>

    </div>

</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const body = document.body;
    const themeToggle = document.getElementById("theme-toggle");
    const menuToggle = document.getElementById("mobile-menu-toggle");
    const navLinks = document.getElementById("primary-nav-links");
    const navbar = document.getElementById("site-navbar");
    const safetyBar = document.getElementById("navigation-safety-bar");
    const backButton = document.getElementById("app-back-button");

    function applySavedTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersLight = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
        const shouldUseLight = savedTheme === "light" ||
            (!savedTheme && prefersLight);

        body.classList.toggle("light-mode", shouldUseLight);

        if (themeToggle) {
            themeToggle.textContent = shouldUseLight ? "☀️" : "🌙";
            themeToggle.setAttribute(
                "aria-label",
                shouldUseLight ? "Switch to dark theme" : "Switch to light theme"
            );
        }
    }

    function closeMenu() {
        if (!menuToggle || !navLinks) return;

        navLinks.classList.remove("is-open");
        menuToggle.setAttribute("aria-expanded", "false");
        body.classList.remove("menu-open");
    }

    applySavedTheme();

    if (themeToggle) {
        themeToggle.addEventListener("click", function () {
            body.classList.toggle("light-mode");

            const lightModeOn = body.classList.contains("light-mode");
            localStorage.setItem("theme", lightModeOn ? "light" : "dark");
            themeToggle.textContent = lightModeOn ? "☀️" : "🌙";
            themeToggle.setAttribute(
                "aria-label",
                lightModeOn ? "Switch to dark theme" : "Switch to light theme"
            );
        });
    }

    if (menuToggle && navLinks) {
        menuToggle.addEventListener("click", function (event) {
            event.stopPropagation();

            const opening = !navLinks.classList.contains("is-open");
            navLinks.classList.toggle("is-open", opening);
            menuToggle.setAttribute("aria-expanded", opening ? "true" : "false");
            body.classList.toggle("menu-open", opening);
        });

        navLinks.querySelectorAll("a").forEach(function (link) {
            link.addEventListener("click", closeMenu);
        });

        document.addEventListener("click", function (event) {
            if (navbar && !navbar.contains(event.target)) {
                closeMenu();
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeMenu();
                menuToggle.focus();
            }
        });

        window.addEventListener("resize", function () {
            if (window.innerWidth > 900) {
                closeMenu();
            }
        });
    }

    const normalizedPath = window.location.pathname.replace(/\/+$/, "") || "/";
    const onHomePage = normalizedPath === "/";

    if (safetyBar) {
        safetyBar.hidden = onHomePage;
        body.classList.toggle("has-navigation-safety", !onHomePage);
    }

    if (navLinks) {
        navLinks.querySelectorAll("a").forEach(function (link) {
            let linkPath = "/";

            try {
                linkPath = new URL(link.href, window.location.origin)
                    .pathname
                    .replace(/\/+$/, "") || "/";
            } catch (error) {
                linkPath = "/";
            }

            const exactMatch = linkPath === normalizedPath;
            const sectionMatch = linkPath !== "/" &&
                normalizedPath.startsWith(linkPath + "/");

            if (exactMatch || sectionMatch) {
                link.setAttribute("aria-current", "page");
            }
        });
    }

    if (backButton) {
        backButton.addEventListener("click", function () {
            let hasSameSiteReferrer = false;

            try {
                hasSameSiteReferrer = Boolean(document.referrer) &&
                    new URL(document.referrer).origin === window.location.origin;
            } catch (error) {
                hasSameSiteReferrer = false;
            }

            if (hasSameSiteReferrer && window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "/";
            }
        });
    }
});
</script>

</body>
</html>
