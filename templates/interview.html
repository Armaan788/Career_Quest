{% extends "base.html" %}

{% block content %}

<div class="result-card">

    <h1>🎤 Career Interview</h1>

    <h2>{{ career }}</h2>

    {% if scenario %}

    <div class="scenario-box">

        <h3>🎲 Scenario</h3>

        <p>{{ scenario }}</p>

    </div>

    {% endif %}

    <p class="question">
        {{ question }}
    </p>

    <form method="POST">

        <textarea
            name="answer"
            rows="6"
            placeholder="Type your answer..."
            class="interview-box"
            required></textarea>

        <br><br>

        <button class="btn">
            Submit Answer
        </button>

    </form>

    {% if feedback %}

    <div class="coach-box">

        <h3>🤖 Interview Feedback</h3>

        <p>{{ feedback }}</p>

    </div>

    {% endif %}

    <div class="button-row">

        <a href="/result" class="btn">
            ← Back to Results
        </a>

        <a href="/" class="btn secondary-btn">
            🏠 Home
        </a>

    </div>

</div>

{% endblock %}
